<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Moje rezervace - Rentulo</title>
<link rel="stylesheet" href="css/account-pages.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f3ee;
      color: #073f2e;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .header {
      max-width: 1240px;
      margin: 0 auto;
      padding: 6px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #006b45;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
    }

    .logo-icon::before {
      content: "✓";
    }

    .logo-dot {
      display: none;
    }

    .logo-text strong {
      display: block;
      font-size: 19px;
      line-height: 1;
      color: #073f2e;
    }

    .logo-text small {
      display: block;
      margin-top: 1px;
      font-size: 12px;
      color: #4d5b55;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    .nav .active-link {
      font-weight: 800;
    }

    .btn-register,
    .logout-link {
      background: #006b45;
      color: white !important;
      padding: 9px 18px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
    }

    .account-page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 8px 20px 18px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 5px;
      color: #006b45;
      font-size: 14px;
      font-weight: 800;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .account-page-header {
      position: relative;
      margin-bottom: 12px;
      padding-right: 165px;
    }

    .eyebrow {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 800;
      color: #4d5b55;
    }

    h1 {
      margin: 0 0 3px;
      font-size: 28px;
      line-height: 1;
      color: #073f2e;
    }

    .account-page-header p {
      margin: 0;
      font-size: 14px;
      color: #334c43;
    }

    .top-action-button {
      position: absolute;
      right: 0;
      top: 14px;
      background: #ff6500;
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
    }

    .top-action-button:hover {
      background: #e85d00;
    }

    .account-list {
      display: grid;
      gap: 10px;
    }

    .reservation-section {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .reservation-section:last-child {
      margin-bottom: 0;
    }

    .reservation-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
    }

    .reservation-section-header h2 {
      margin: 0;
      font-size: 18px;
      color: #073f2e;
    }

    .reservation-section-header span {
      border-radius: 999px;
      background: #e2f3eb;
      color: #006b45;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .reservation-section.history .reservation-section-header span {
      background: #eef1ed;
      color: #334c43;
    }

    .reservation-table-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
      overflow: hidden;
      border: 1px solid #eee4d7;
    }

    .reservation-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .reservation-table th {
      background: #f8f5f0;
      color: #4d5b55;
      text-align: left;
      padding: 9px 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-bottom: 1px solid #e5ddd2;
      white-space: nowrap;
    }

    .reservation-table th:last-child {
      text-align: right;
    }

    .reservation-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #eee4d7;
      vertical-align: middle;
      color: #173e33;
    }

    .reservation-table td:last-child {
      text-align: right;
    }

    .reservation-table tr:last-child td {
      border-bottom: none;
    }

    .reservation-row {
      transition: background 0.2s ease, outline 0.2s ease;
    }

    .reservation-row:hover {
      background: #fbfaf7;
    }

    .tool-cell {
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 9px;
      align-items: center;
      min-width: 180px;
    }

    .tool-thumb {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #ece6dc;
      border: 1px solid #e3dace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #073f2e;
      font-size: 18px;
      font-weight: 900;
    }

    .tool-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tool-name {
      display: block;
      color: #073f2e;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.15;
    }

    .tool-meta {
      display: block;
      margin-top: 1px;
      color: #5b6862;
      font-size: 12px;
      line-height: 1.2;
    }

    .date-cell,
    .price-cell {
      white-space: nowrap;
      font-weight: 800;
      color: #073f2e;
    }

    .owner-cell {
      color: #334c43;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #fff0e6;
      color: #df5b00;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-paid {
      background: #e2f3eb;
      color: #006b45;
    }

    .status-finished {
      background: #eef1ed;
      color: #334c43;
    }

    .status-rejected {
      background: #fff0e6;
      color: #df5b00;
    }

    .table-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 155px;
    }

    .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      border-radius: 9px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      background: #006b45;
      color: white;
      white-space: nowrap;
      min-height: 32px;
    }

    .small-button:hover {
      background: #00563a;
    }

    .small-button.light {
      background: #eee8de;
      color: #073f2e;
    }

    .small-button.light:hover {
      background: #e3dace;
    }

    .small-button.orange {
      background: #ff6500;
      color: white;
    }

    .small-button.orange:hover {
      background: #e85d00;
    }

    .small-button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .detail-row {
      display: none;
    }

    .detail-row.open {
      display: table-row;
    }

    .detail-row td {
      background: #fbfaf7;
      padding: 0;
      text-align: left;
    }

    .reservation-detail-panel {
      padding: 11px 12px;
      display: grid;
      gap: 9px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .info-box {
      background: #ffffff;
      border: 1px solid #eee4d7;
      border-radius: 11px;
      padding: 8px 9px;
      min-height: 48px;
    }

    .info-box span {
      display: block;
      color: #5b6862;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .info-box strong {
      display: block;
      font-size: 14px;
      color: #073f2e;
    }

    .payment-box,
    .contact-box,
    .reservation-state-box,
    .review-box {
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.4;
    }

    .payment-box.waiting {
      background: #fff7f0;
      border: 1px solid #ffe0c8;
      color: #5b3a22;
    }

    .payment-box.paid {
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
    }

    .reservation-state-box.active {
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
    }

    .reservation-state-box.finished {
      background: #eef1ed;
      border: 1px solid #dde5df;
      color: #334c43;
    }

    .reservation-state-box.rejected {
      background: #fff0e6;
      border: 1px solid #ffd5b8;
      color: #5b3a22;
    }

    .review-box {
      background: #fffdf8;
      border: 1px solid #eee4d7;
      color: #073f2e;
    }

    .payment-box strong,
    .contact-box strong,
    .reservation-state-box strong,
    .review-box strong {
      display: block;
      margin-bottom: 4px;
      color: #073f2e;
    }

    .payment-box.waiting strong,
    .reservation-state-box.rejected strong {
      color: #df5b00;
    }

    .payment-lines,
    .contact-lines,
    .review-lines {
      display: grid;
      gap: 4px;
      margin-top: 6px;
    }

    .contact-box.hidden {
      background: #fff7f0;
      border: 1px solid #ffe0c8;
      color: #5b3a22;
    }

    .contact-box.visible {
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
    }

    .contact-box.hidden strong {
      color: #df5b00;
    }

    .section-empty-note {
      margin: 0;
      padding: 12px;
      border-radius: 14px;
      background: #ffffff;
      color: #5b6862;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
    }

    .account-empty-state {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
    }

    .account-empty-state h2 {
      margin: 0 0 6px;
      font-size: 22px;
      color: #073f2e;
    }

    .account-empty-state p {
      margin: 0 0 14px;
      color: #334c43;
      font-size: 15px;
    }

    .account-empty-state a {
      display: inline-flex;
      background: #ff6500;
      color: white;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        flex-wrap: wrap;
        gap: 10px;
      }

      .account-page-header {
        padding-right: 0;
      }

      .top-action-button {
        position: static;
        display: inline-flex;
        margin-top: 10px;
      }

      .reservation-table-card {
        background: transparent;
        border: none;
        box-shadow: none;
        border-radius: 0;
        overflow: visible;
      }

      .reservation-table,
      .reservation-table tbody,
      .reservation-table tr,
      .reservation-table td {
        display: block;
        width: 100%;
      }

      .reservation-table thead {
        display: none;
      }

      .reservation-row {
        margin-bottom: 8px;
        padding: 12px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
        border: 1px solid #eee4d7;
      }

      .reservation-row td {
        border-bottom: none;
        padding: 5px 0;
        text-align: left;
      }

      .reservation-row td::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 2px;
        color: #5b6862;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .reservation-row td:first-child::before {
        display: none;
      }

      .tool-cell {
        grid-template-columns: 42px 1fr;
      }

      .tool-thumb {
        width: 42px;
        height: 42px;
      }

      .owner-cell,
      .date-cell,
      .price-cell {
        white-space: normal;
      }

      .table-actions {
        justify-content: flex-start;
        min-width: 0;
        margin-top: 4px;
      }

      .detail-row.open {
        display: block;
      }

      .detail-row td {
        display: block;
        padding: 0;
        background: transparent;
      }

      .reservation-detail-panel {
        margin-bottom: 10px;
        padding: 12px;
        border-radius: 16px;
        background: #fbfaf7;
        border: 1px solid #eee4d7;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .account-page {
        padding-left: 14px;
        padding-right: 14px;
      }

      .reservation-section-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 7px;
      }

      .table-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .small-button {
        width: 100%;
      }
    }
  

    /* Card redesign for reservation overview */
    .reservation-card-list {
      display: grid;
      gap: 14px;
    }

    .reservation-card {
      background: #ffffff;
      border: 1px solid #e7ddd0;
      border-radius: 18px;
      overflow: visible;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.035);
    }

    .reservation-card.priority {
      border-color: #ff9b58;
      box-shadow: 0 10px 28px rgba(255, 98, 0, 0.09);
    }

    .reservation-card-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
    }

    .reservation-card-tool {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .reservation-card-tool .tool-thumb {
      width: 64px;
      height: 64px;
      flex: 0 0 64px;
      border-radius: 14px;
    }

    .reservation-title-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 9px;
    }

    .reservation-title-line h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .reservation-card-tool p {
      margin: 6px 0 0;
      color: #64706b;
      font-size: 14px;
    }

    .reservation-card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .reservation-primary-action {
      min-height: 44px;
      padding: 10px 17px;
      border: 0;
      border-radius: 12px;
      background: #eee9e1;
      color: #073f2e;
      font-weight: 800;
      cursor: pointer;
    }

    .reservation-primary-action.orange {
      background: #ff6200;
      color: #ffffff;
    }

    .reservation-more-menu {
      position: relative;
    }

    .reservation-more-menu summary {
      display: grid;
      place-items: center;
      width: 46px;
      height: 44px;
      border-radius: 12px;
      background: #eee9e1;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      list-style: none;
    }

    .reservation-more-menu summary::-webkit-details-marker {
      display: none;
    }

    .reservation-more-menu-panel {
      position: absolute;
      z-index: 20;
      top: calc(100% + 8px);
      right: 0;
      min-width: 190px;
      padding: 8px;
      background: #ffffff;
      border: 1px solid #e7ddd0;
      border-radius: 14px;
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12);
    }

    .reservation-more-menu-panel a,
    .reservation-more-menu-panel button {
      display: block;
      width: 100%;
      padding: 10px 11px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #073f2e;
      text-align: left;
      font-weight: 800;
      cursor: pointer;
    }

    .reservation-more-menu-panel a:hover,
    .reservation-more-menu-panel button:hover {
      background: #f6f3ee;
    }

    .reservation-card-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }

    .reservation-card-meta > div {
      padding: 12px;
      border: 1px solid #eee4d8;
      border-radius: 12px;
      background: #fcfaf7;
    }

    .reservation-card-meta span,
    .reservation-card-meta strong {
      display: block;
    }

    .reservation-card-meta span {
      margin-bottom: 4px;
      color: #66716d;
      font-size: 12px;
      font-weight: 800;
    }

    .history-card .reservation-card-main {
      padding: 14px 16px;
    }

    .history-card .reservation-card-meta {
      padding: 0 16px 14px;
    }

    .history-card .reservation-card-tool .tool-thumb {
      width: 50px;
      height: 50px;
      flex-basis: 50px;
    }

    .detail-row {
      display: none;
      border-top: 1px solid #eee4d8;
      background: #fbfaf7;
    }

    .detail-row.open {
      display: block;
    }

    .detail-row .reservation-detail-panel {
      padding: 16px 18px 18px;
    }

    @media (max-width: 760px) {
      .reservation-card-main {
        align-items: flex-start;
      }

      .reservation-card-actions {
        margin-left: auto;
      }

      .reservation-card-meta {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .reservation-card-main {
        flex-direction: column;
      }

      .reservation-card-actions {
        width: 100%;
        margin-left: 0;
      }

      .reservation-primary-action {
        flex: 1;
      }
    }
</style>
  <link rel="stylesheet" href="css/compact-records.css" />
</head>

<body data-navigation-page="muj-ucet">

  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <span class="logo-dot"></span>
      </div>

      <div class="logo-text">
        <strong>Rentulo</strong>
        <small>Půjč si cokoli</small>
      </div>
    </a>

    <nav class="nav" id="mainNav"></nav>
  </header>

  <main class="account-page">

    <a href="muj-ucet.html" class="back-link">← Zpět do účtu</a>

    <section class="account-page-header">
      

      <h1>Moje rezervace</h1>

      <p>Spravujte své rezervace a jejich průběh.</p>

      <a href="vysledky.html" class="top-action-button">Najít věc</a>
    </section>

    <section class="account-list" id="reservationsList"></section>

  </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/api.js"></script>
<script src="js/navigation.js"></script>
<script src="js/storage.js"></script>
<script src="js/reservation-status.js"></script>
<script src="js/reservations.js"></script>
<script src="js/reservations-page.js"></script>
</body>
