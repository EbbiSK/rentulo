<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="data:,">
  <title>Detail věci - Rentulo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f3ee;
      color: #073f2e;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      padding: 6px 0;
      background: #f6f3ee;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: #006b45;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 21px;
      font-weight: 800;
    }

    .logo-icon::before {
      content: "✓";
    }

    .logo-dot {
      display: none;
    }

    .logo-title {
      margin: 0;
      font-size: 19px;
      line-height: 1;
      color: #073f2e;
      font-weight: 900;
    }

    .logo-subtitle {
      margin: 2px 0 0;
      font-size: 12px;
      color: #4d5b55;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    nav a {
      font-weight: 500;
    }

    nav .active-link {
      font-weight: 800;
    }

    nav .btn-register,
    nav .logout-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #006b45;
      color: white !important;
      padding: 9px 18px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
    }

    main {
      padding: 8px 0 24px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #006b45;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 12px;
      align-items: start;
    }

    .detail-main-card,
    .sidebar,
    .message-card {
      background: white;
      border: 1px solid #eadfd1;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.035);
      overflow: hidden;
    }

    .detail-main-card {
      padding: 0;
    }

    .image-box {
      height: 190px;
      background: #ece6dc;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-bottom: 1px solid #eadfd1;
    }

    .image-box.has-photo {
      background: #073f2e;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .image-icon {
      width: 54px;
      height: 54px;
      border-radius: 15px;
      background: #073f2e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 800;
    }

    .image-label {
      position: absolute;
      left: 12px;
      bottom: 10px;
      max-width: calc(100% - 24px);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-weight: 900;
      color: #073f2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-box:not(.has-photo) .image-label {
      background: transparent;
      padding: 0;
      color: #4e5d56;
      border-radius: 0;
    }

    .detail-content {
      padding: 12px;
    }

    .category-line {
      font-size: 13px;
      margin-bottom: 4px;
      color: #334c43;
      font-weight: 700;
    }

    .category-line strong {
      color: #ff6500;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 27px;
      line-height: 1.05;
      color: #073f2e;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 7px 0 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: #eee8de;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      color: #27483d;
      font-weight: 900;
      line-height: 1;
    }

    .badge.available {
      background: #e2f3eb;
      color: #006b45;
    }

    .badge.unavailable {
      background: #fff0e6;
      color: #df5b00;
    }

    .badge.draft {
      background: #fff7f0;
      color: #5b3a22;
    }

    .description {
      font-size: 14px;
      line-height: 1.35;
      color: #183f34;
      margin: 0 0 10px;
      font-weight: 700;
    }

    .availability-panel {
      margin-bottom: 10px;
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 800;
    }

    .availability-panel.available {
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
    }

    .availability-panel.unavailable {
      background: #fff7f0;
      border: 1px solid #ffe0c8;
      color: #5b3a22;
    }

    .availability-panel strong {
      display: block;
      margin-bottom: 3px;
      font-size: 14px;
    }

    .availability-panel.available strong {
      color: #006b45;
    }

    .availability-panel.unavailable strong {
      color: #df5b00;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .section {
      background: #fffdf8;
      border: 1px solid #eee8de;
      border-radius: 13px;
      padding: 10px;
    }

    .section h2 {
      margin: 0 0 7px;
      font-size: 16px;
      color: #073f2e;
    }

    .section ul {
      margin: 0;
      padding-left: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 700;
    }

    .section p {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #183f34;
      font-weight: 700;
    }

    .pickup-preview {
      display: grid;
      gap: 7px;
      margin-top: 9px;
      font-size: 13px;
      line-height: 1.3;
    }

    .pickup-preview-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #eee8de;
      padding-bottom: 7px;
    }

    .pickup-preview-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .pickup-preview-row span:first-child {
      color: #5b6862;
    }

    .pickup-preview-row span:last-child {
      color: #073f2e;
      font-weight: 900;
      text-align: right;
    }

    .gps-note {
      margin-top: 9px;
      padding: 8px 9px;
      border-radius: 11px;
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 900;
    }

    .gps-note.missing {
      background: #fff7f0;
      border-color: #ffe0c8;
      color: #5b3a22;
    }

    .sidebar {
      padding: 12px;
      position: sticky;
      top: 10px;
    }

    .price {
      font-size: 31px;
      font-weight: 900;
      color: #006b45;
      line-height: 1;
      margin-bottom: 1px;
    }

    .price-small {
      font-size: 13px;
      color: #5e6c66;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .info-list {
      display: grid;
      gap: 0;
      margin-bottom: 10px;
      border: 1px solid #eee8de;
      border-radius: 11px;
      overflow: hidden;
      background: #fffdf8;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #eee8de;
      padding: 8px 9px;
      font-size: 13px;
      line-height: 1.3;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row span:first-child {
      color: #5b6862;
      font-weight: 700;
    }

    .info-row span:last-child {
      font-weight: 900;
      text-align: right;
      color: #073f2e;
    }

    .privacy-box {
      background: #fff7f0;
      border: 1px solid #ffe0c8;
      border-radius: 12px;
      padding: 9px;
      margin-bottom: 9px;
      font-size: 12px;
      line-height: 1.35;
      color: #5b3a22;
      font-weight: 700;
    }

    .privacy-box strong {
      display: block;
      margin-bottom: 3px;
      color: #df5b00;
      font-size: 13px;
    }

    .availability-box {
      border-radius: 12px;
      padding: 9px;
      margin-bottom: 9px;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .availability-box.available {
      background: #e2f3eb;
      border: 1px solid #c7e8d7;
      color: #073f2e;
    }

    .availability-box.unavailable {
      background: #fff7f0;
      border: 1px solid #ffe0c8;
      color: #5b3a22;
    }

    .availability-box strong {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
    }

    .availability-box.available strong {
      color: #006b45;
    }

    .availability-box.unavailable strong {
      color: #df5b00;
    }

    .booking-box {
      margin-top: 9px;
      background: #f8f5f0;
      border: 1px solid #e9e1d6;
      border-radius: 13px;
      padding: 10px;
    }

    .booking-box h2 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #073f2e;
    }

    .form-group {
      margin-bottom: 8px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 900;
      color: #173e33;
    }

    .form-group input {
      width: 100%;
      height: 36px;
      border: 1px solid #d8d0c5;
      border-radius: 10px;
      background: white;
      padding: 0 10px;
      font-size: 13px;
      color: #073f2e;
      font-weight: 700;
    }

    .form-group input:focus {
      outline: none;
      border-color: #006b45;
      box-shadow: 0 0 0 3px rgba(0, 107, 69, 0.12);
    }

    .date-help {
      font-size: 12px;
      color: #68746f;
      line-height: 1.3;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .calculation {
      background: white;
      border: 1px solid #e6ded3;
      border-radius: 11px;
      margin-bottom: 9px;
      overflow: hidden;
      display: grid;
      gap: 0;
    }

    .calc-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      border-bottom: 1px solid #eee8de;
      padding: 7px 9px;
    }

    .calc-row:last-child {
      border-bottom: none;
    }

    .calc-row span {
      color: #5b6862;
      font-weight: 700;
    }

    .calc-row strong {
      color: #073f2e;
      text-align: right;
    }

    .calc-total {
      background: #fffdf8;
      font-size: 14px;
      font-weight: 900;
    }

    .primary-button {
      width: 100%;
      border: none;
      border-radius: 9px;
      background: #006b45;
      color: white;
      font-size: 13px;
      font-weight: 900;
      padding: 9px 12px;
      cursor: pointer;
      text-align: center;
      min-height: 34px;
    }

    .primary-button:hover {
      background: #00563a;
    }

    .primary-button.disabled,
    .primary-button:disabled {
      background: #d8d0c5;
      color: #5b6862;
      cursor: not-allowed;
    }

    .note {
      margin-top: 9px;
      font-size: 12px;
      color: #68746f;
      line-height: 1.35;
      font-weight: 700;
    }

    .message-card {
      padding: 16px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message-card strong {
      color: #006b45;
    }

    .message-card.warning strong {
      color: #df5b00;
    }

    .message-card .primary-button {
      display: inline-flex;
      justify-content: center;
      width: auto;
      margin-top: 12px;
    }

    @media (max-width: 980px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      nav {
        flex-wrap: wrap;
        gap: 12px;
      }

      .detail-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .container {
        padding: 0 14px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 25px;
      }

      .image-box {
        height: 185px;
      }

      .detail-content {
        padding: 12px;
      }
    }

    @media (max-width: 430px) {
      header {
        padding: 8px 0;
      }

      .header-inner {
        gap: 10px;
      }

      .logo {
        gap: 8px;
        align-items: center;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        border-radius: 11px;
        font-size: 22px;
      }

      .logo-title {
        font-size: 18px;
      }

      .logo-subtitle {
        font-size: 11px;
      }

      nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        gap: 6px 8px;
        font-size: 14px;
        margin-top: 0;
      }

      nav a,
      nav .btn-register,
      nav .logout-link {
        width: 100%;
        min-height: 38px;
        justify-content: center;
        text-align: center;
        padding: 7px 10px;
        border-radius: 999px;
      }

      main {
        padding-top: 8px;
      }

      .back-link {
        font-size: 14px;
      }

      .image-box {
        height: 180px;
      }

      .description {
        font-size: 14px;
      }

      .badges {
        gap: 6px;
      }

      .badge {
        font-size: 12px;
      }

      .info-row,
      .pickup-preview-row {
        flex-direction: column;
        gap: 2px;
      }

      .info-row span:last-child,
      .pickup-preview-row span:last-child {
        text-align: left;
      }

      .message-card .primary-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <span class="logo-dot"></span>
        </div>

        <div>
          <p class="logo-title">Rentulo</p>
          <p class="logo-subtitle">Půjč si cokoli</p>
        </div>
      </a>

      <nav id="mainNav"></nav>
    </div>
  </header>

  <main>
    <div class="container">
      <a href="vysledky.html" class="back-link" id="detailBackLink">← Zpět na výsledky</a>
      <div id="detailContent"></div>
    </div>
  </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/navigation.js"></script>
<script src="js/storage.js"></script>
<script src="js/reservation-status.js"></script>
<script src="js/reservations.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/api.js"></script>
<script src="js/detail-page.js"></script>

</body>
</html>
