<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Supabase test - Rentulo</title>
</head>
<body>
  <h1>Supabase test</h1>

  <p id="status">Testujem pripojenie...</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script>
    async function testSupabaseConnection() {
      const statusElement = document.getElementById("status");

      if (!window.supabase) {
        statusElement.textContent = "Chyba: Supabase knižnica sa nenačítala.";
        return;
      }

      if (!window.rentuloSupabase && typeof rentuloSupabase === "undefined") {
        statusElement.textContent = "Chyba: Supabase klient nie je vytvorený.";
        return;
      }

      const client = window.rentuloSupabase || rentuloSupabase;

      const { data, error } = await client
        .from("public_offers")
        .select("*")
        .limit(5);

      if (error) {
        statusElement.textContent = "Chyba pripojenia: " + error.message;
        console.error(error);
        return;
      }

      statusElement.textContent = "Pripojenie funguje. Načítané ponuky: " + data.length;
      console.log("Supabase data:", data);
    }

    testSupabaseConnection();
  </script>
</body>
</html>
